name: CI

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install backend dependencies
        run: pip install -r requirements.txt

      - name: Compile scripts
        run: python -m py_compile scripts/catalyst_score.py

      - name: Run unit tests
        run: python -m unittest discover -s tests

      - name: Run example scoring
        run: python scripts/catalyst_score.py examples/events.json --pretty --strict

      - name: Check website scripts
        run: node --check web/scoring.js && node --check web/evidence.js && node --check web/app.js && node --check web/sw.js

      - name: Validate web manifest
        run: python -m json.tool web/manifest.webmanifest > /dev/null

      - name: Run website scoring tests
        run: node --test tests/test_web_scoring.js tests/test_web_evidence.js
